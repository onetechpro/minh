<html lang="pt-BR">
<head>

    <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
    
      if (!id) return;
    
      function tryDecodeBase64(str) {
        if (str.length % 4 !== 0) return null;
        if (!/^[A-Za-z0-9+/]*={0,2}$/.test(str)) return null;
    
        try {
          const decoded = decodeURIComponent(escape(atob(str)));
          return decoded !== str ? decoded : null;
        } catch (e) {
          return null;
        }
      }
    
      const decoded = tryDecodeBase64(id);
      document.title = `EMBED MT | ${decoded ?? id}`;
    })();
    </script>

<style>
  :root{
    --bg:#0A0B0F;
    --panel:#0E1016;
    --glass:rgba(255,255,255,0.06);
    --glass-border:rgba(255,255,255,0.12);
    --cyan:#00E5FF;
    --amber:#FF6B45;
    --muted:#8B93A1;
    --text:#E6E9EF;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    width:100%; min-height:100%;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }

  .stage{
    position:relative;
    width:100%; min-height:100svh;
    display:flex; flex-direction:column; align-items:center;
    gap:22px;
    padding:24px 16px 56px;
  }
  @media (min-width:481px){
    .stage{
      height:100svh;
      min-height:0;
      overflow-y:auto;
      overflow-x:hidden;
      padding:20px 16px;
    }
    .player-shell{
      flex:1 1 auto;
      min-height:0;
    }
    .info-panel{ flex:0 0 auto; }
    #histats_counter{ flex:0 0 auto; }
  }

  /* glow ambiente fixo atrás de tudo */
  .ambient{
    position:fixed; inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
  }
  .ambient::before, .ambient::after{
    content:'';
    position:absolute;
    width:60vmax; height:60vmax;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.14;
  }
  .ambient::before{
    top:-20vmax; left:-15vmax;
    background:var(--cyan);
    animation:drift1 22s ease-in-out infinite;
  }
  .ambient::after{
    bottom:-25vmax; right:-15vmax;
    background:#7C4DFF;
    animation:drift2 26s ease-in-out infinite;
  }
  @keyframes drift1{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(6vmax,4vmax) scale(1.1); }
  }
  @keyframes drift2{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(-5vmax,-3vmax) scale(1.08); }
  }

  .player-shell{
    position:relative;
    width:100%;
    max-width:820px;
    display:flex; align-items:center; justify-content:center;
    z-index:1;
  }

  .player-frame{
    position:relative;
    width:min(100%, calc(64svh * 16 / 9));
    aspect-ratio:16/9;
    background:#000;
    overflow:hidden;
    border:1px solid var(--glass-border);
    box-shadow:0 30px 80px rgba(0,0,0,0.55);
    opacity:0;
    transform:scale(0.985);
    transition:opacity 0.7s ease, transform 0.7s ease;
  }
  .player-frame.ready{ opacity:1; transform:scale(1); }

  .player-frame iframe{
    position:absolute; inset:0;
    width:100%; height:100%;
    border:none;
    background:#000;
  }

  /* ===== Loader: íris de lente ===== */
  .loader{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px;
    background:linear-gradient(180deg, #0A0B0F 0%, #0E1016 100%);
    z-index:3;
    transition:opacity 0.5s ease, visibility 0.5s ease;
  }
  .loader.hidden{ opacity:0; visibility:hidden; pointer-events:none; }

  .iris{ width:64px; height:64px; position:relative; }
  .iris svg{ width:100%; height:100%; }

  .iris .blade{
    transform-origin:50px 50px;
    fill:var(--glass);
    stroke:var(--cyan);
    stroke-width:1;
    animation:iris-pulse 1.8s ease-in-out infinite;
  }
  .iris .blade:nth-child(1){ animation-delay:0s; }
  .iris .blade:nth-child(2){ animation-delay:0.1s; }
  .iris .blade:nth-child(3){ animation-delay:0.2s; }
  .iris .blade:nth-child(4){ animation-delay:0.3s; }
  .iris .blade:nth-child(5){ animation-delay:0.4s; }
  .iris .blade:nth-child(6){ animation-delay:0.5s; }

  @keyframes iris-pulse{
    0%,100%{ transform:rotate(0deg) scale(1); opacity:0.55; }
    50%{ transform:rotate(8deg) scale(1.04); opacity:1; }
  }

  .loader-text{
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:13px;
    letter-spacing:0.4px;
    color:var(--muted);
  }

  /* ===== Tela de erro do player ===== */
  .error-screen{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px;
    text-align:center;
    padding:30px;
    height:100%;
    background:linear-gradient(180deg, #0A0B0F 0%, #0E1016 100%);
  }
  .error-badge{
    width:48px; height:48px;
    border-radius:50%;
    border:1px solid rgba(255,107,69,0.4);
    background:rgba(255,107,69,0.08);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    color:var(--amber);
    font-size:20px;
  }
  .error-screen h2{
    margin:0;
    font-family:'Space Grotesk',sans-serif;
    font-size:17px;
    font-weight:600;
    color:#fff;
  }
  .error-screen p{
    margin:0;
    font-size:13px;
    color:var(--muted);
    max-width:300px;
    line-height:1.6;
  }

  /* ===== Painel de informações para embed ===== */
  .info-panel{
    position:relative;
    width:100%;
    max-width:820px;
    z-index:1;
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    padding:22px 22px 26px;
    opacity:0;
    transform:translateY(14px);
    transition:opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s;
  }
  .info-panel.ready{ opacity:1; transform:translateY(0); }

  .info-header{
    display:flex; align-items:center; gap:10px;
    margin-bottom:16px;
  }
  .info-header .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 10px var(--cyan);
    flex-shrink:0;
  }
  .info-header h2{
    margin:0;
    font-family:'Space Grotesk',sans-serif;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.4px;
    color:var(--text);
    text-transform:uppercase;
  }

  .info-list{
    list-style:none;
    margin:0 0 18px;
    padding:0;
    display:grid;
    gap:10px;
  }
  .info-list li{
    display:flex; gap:10px;
    font-size:13px;
    line-height:1.55;
    color:var(--muted);
  }
  .info-list li b{
    color:var(--text);
    font-weight:500;
  }
  .info-list li::before{
    content:'';
    width:5px; height:5px;
    border-radius:50%;
    background:var(--glass-border);
    margin-top:7px;
    flex-shrink:0;
  }

  .code-label{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px;
  }
  .code-label span{
    font-family:'Space Grotesk',sans-serif;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.6px;
    text-transform:uppercase;
    color:var(--muted);
  }

  .copy-btn{
    font-family:'Inter',sans-serif;
    font-size:12px;
    font-weight:500;
    color:var(--cyan);
    background:rgba(0,229,255,0.08);
    border:1px solid rgba(0,229,255,0.25);
    padding:6px 12px;
    cursor:pointer;
    transition:background 0.2s ease, transform 0.15s ease;
  }
  .copy-btn:hover{ background:rgba(0,229,255,0.16); }
  .copy-btn:active{ transform:scale(0.97); }
  .copy-btn.copied{ color:#7CFFB2; border-color:rgba(124,255,178,0.35); background:rgba(124,255,178,0.08); }

  .code-block{
    margin:0;
    background:#000;
    border:1px solid var(--glass-border);
    padding:14px 16px;
    overflow-x:auto;
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    line-height:1.6;
    color:#9EF0FF;
    white-space:pre;
  }
  .code-block .attr{ color:#7C4DFF; }
  .code-block .val{ color:#7CFFB2; }
  .code-block .tag{ color:var(--muted); }

  #histats_counter{
    position:relative;
    z-index:1;
    margin-top:-6px;
    display:flex;
    justify-content:center;
  }

  .info-footnote{
    margin:14px 0 0;
    font-size:11.5px;
    color:#5C6472;
    line-height:1.6;
  }

  @media (max-width:900px){
    .player-shell, .info-panel{ max-width:680px; }
    .player-frame{ width:min(100%, calc(58svh * 16 / 9)); }
  }

  @media (max-width:480px){
    .stage{ padding:16px 10px 40px; gap:16px; }
    .player-frame{ width:100%; }
    .info-panel{ padding:18px 16px 20px; }
    .code-block{ font-size:11.5px; padding:12px; }
  }
</style>
</head>

  <div class="stage">
    <div class="player-shell">
      <div id="frame" class="player-frame">
        <div id="loader" class="loader">
